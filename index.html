<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Vibe Lab - 互動數學試題</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 與 Babel (用於即時編譯 JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Lucide 圖標 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020408; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // 圖標組件封裝 (為了在 CDN 環境下使用 Lucide)
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const initialQuestions = [
                { id: 1, type: 'tf', text: '一個長方體的長和寬不變，高變成原來的 4 倍，體積也會變成原來的 4 倍。', answer: 'O', explanation: '長方體體積 = 長 × 寬 × 高。當長和寬不變，高變 4 倍，體積確實會隨之變為 4 倍。' },
                { id: 2, type: 'tf', text: '用小正方體積木堆成一個大的正方體，至少需要 4 個小正方體積木。', answer: 'X', explanation: '堆成一個「大的正方體」，邊長至少要 2 個單位，所以需要 2×2×2 = 8 個小正方體。' },
                { id: 3, type: 'tf', text: '86 的 1/100 倍是 0.86，就是將小數點向左移二位。', answer: 'O', explanation: '乘以 1/100 等於除以 100。每除以一個 10，小數點就向左移動一位，所以移動兩位是正確的。' },
                { 
                    id: 8, 
                    type: 'mc', 
                    text: '下圖兩個造型都是用 1 立方公分的積木所排出來的，如果把兩個長方體全部排滿，乙長方體體積比甲長方體大多少立方公分？', 
                    image: 'https://images.unsplash.com/photo-1509228468518-180dd4864904?auto=format&fit=crop&q=80&w=800', 
                    options: ['10 立方公分', '20 立方公分', '30 立方公分', '40 立方公分'], 
                    answer: 1, 
                    explanation: '甲長方體(長5,寬3,高4)體積 = 5×3×4 = 60；乙長方體(長4,寬4,高5)體積 = 4×4×5 = 80。乙比甲大 80 - 60 = 20 立方公分。' 
                }
            ];

            const [questions, setQuestions] = useState(initialQuestions);
            const [currentView, setCurrentView] = useState('quiz'); 
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [dailyStats, setDailyStats] = useState({ completed: 0, correct: 0 });
            const [newQuestion, setNewQuestion] = useState({ 
                text: '', type: 'tf', answer: 'O', explanation: '', options: ['', '', '', ''], image: ''
            });

            const fileInputRef = useRef(null);
            const progress = useMemo(() => questions.length > 0 ? (currentIndex / questions.length) * 100 : 0, [currentIndex, questions.length]);

            const handleAnswer = (choice) => {
                if (showResult) return;
                setSelectedAnswer(choice);
                setShowResult(true);
                const isCorrect = choice === questions[currentIndex].answer;
                setDailyStats(prev => ({ completed: prev.completed + 1, correct: isCorrect ? prev.correct + 1 : prev.correct }));
            };

            const nextQuestion = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                    setSelectedAnswer(null);
                    setShowResult(false);
                } else {
                    setCurrentIndex(questions.length); 
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setNewQuestion({ ...newQuestion, image: reader.result });
                    reader.readAsDataURL(file);
                }
            };

            const addQuestion = () => {
                if (!newQuestion.text) return;
                const q = { ...newQuestion, id: Date.now(), answer: newQuestion.type === 'tf' ? newQuestion.answer : parseInt(newQuestion.answer) };
                setQuestions([...questions, q]);
                setNewQuestion({ text: '', type: 'tf', answer: 'O', explanation: '', options: ['', '', '', ''], image: '' });
            };

            return (
                <div className="min-h-screen text-slate-100 p-4 md:p-8">
                    {/* 背景裝飾 */}
                    <div className="fixed inset-0 overflow-hidden -z-10">
                        <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-indigo-600/10 blur-[120px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-fuchsia-600/10 blur-[120px] rounded-full"></div>
                    </div>

                    <nav className="max-w-4xl mx-auto flex items-center justify-between mb-12">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-fuchsia-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                                <Icon name="book-open" className="text-white w-6 h-6" />
                            </div>
                            <h1 className="text-xl font-black tracking-tighter">MATH <span className="text-indigo-400">VIBE</span></h1>
                        </div>
                        <div className="flex bg-white/5 p-1 rounded-xl border border-white/10">
                            <button onClick={() => setCurrentView('quiz')} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${currentView === 'quiz' ? 'bg-indigo-500 text-white' : 'text-slate-400'}`}>作答</button>
                            <button onClick={() => setCurrentView('admin')} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${currentView === 'admin' ? 'bg-indigo-500 text-white' : 'text-slate-400'}`}>出題</button>
                        </div>
                    </nav>

                    <main className="max-w-3xl mx-auto">
                        {currentView === 'quiz' ? (
                            <div className="space-y-6">
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="glass p-4 rounded-2xl text-center">
                                        <Icon name="bar-chart-3" className="w-4 h-4 mx-auto mb-1 text-blue-400" />
                                        <p className="text-[10px] text-slate-500 font-bold uppercase">完成</p>
                                        <p className="text-lg font-black">{dailyStats.completed}</p>
                                    </div>
                                    <div className="glass p-4 rounded-2xl text-center border-emerald-500/20">
                                        <Icon name="check-circle-2" className="w-4 h-4 mx-auto mb-1 text-emerald-400" />
                                        <p className="text-[10px] text-slate-500 font-bold uppercase">正確</p>
                                        <p className="text-lg font-black">{dailyStats.correct}</p>
                                    </div>
                                    <div className="glass p-4 rounded-2xl text-center border-amber-500/20">
                                        <Icon name="trophy" className="w-4 h-4 mx-auto mb-1 text-amber-400" />
                                        <p className="text-[10px] text-slate-500 font-bold uppercase">準確</p>
                                        <p className="text-lg font-black">{dailyStats.completed > 0 ? Math.round((dailyStats.correct/dailyStats.completed)*100) : 0}%</p>
                                    </div>
                                </div>

                                <div className="w-full h-1.5 bg-white/5 rounded-full overflow-hidden border border-white/5">
                                    <div className="h-full bg-gradient-to-r from-indigo-500 to-fuchsia-500 transition-all duration-700" style={{ width: `${progress}%` }}></div>
                                </div>

                                {currentIndex < questions.length ? (
                                    <div className="glass p-8 rounded-[2.5rem] shadow-2xl space-y-6">
                                        <span className="px-2 py-0.5 rounded-md bg-indigo-500/10 border border-indigo-500/20 text-[10px] font-black text-indigo-400 uppercase tracking-widest">
                                            {questions[currentIndex].type === 'tf' ? '是非題' : '選擇題'}
                                        </span>
                                        <h2 className="text-xl md:text-2xl font-bold leading-relaxed">{questions[currentIndex].text}</h2>
                                        
                                        {questions[currentIndex].image && (
                                            <div className="rounded-2xl overflow-hidden border border-white/10">
                                                <img src={questions[currentIndex].image} className="w-full h-auto max-h-[300px] object-contain bg-black/20" />
                                            </div>
                                        )}

                                        <div className={`grid ${questions[currentIndex].type === 'tf' ? 'grid-cols-2' : 'grid-cols-1 md:grid-cols-2'} gap-4`}>
                                            {questions[currentIndex].type === 'tf' ? (
                                                ['O', 'X'].map(choice => (
                                                    <button key={choice} onClick={() => handleAnswer(choice)} disabled={showResult}
                                                        className={`p-6 rounded-2xl border transition-all ${showResult && questions[currentIndex].answer === choice ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400' : showResult && selectedAnswer === choice ? 'bg-red-500/20 border-red-500/50 text-red-400' : 'bg-white/5 border-white/10 hover:bg-white/10'}`}
                                                    >
                                                        <Icon name={choice === 'O' ? 'check-circle-2' : 'x-circle'} className="w-8 h-8 mx-auto mb-2" />
                                                        <span className="font-black">{choice === 'O' ? '正確 (O)' : '錯誤 (X)'}</span>
                                                    </button>
                                                ))
                                            ) : (
                                                questions[currentIndex].options.map((opt, idx) => (
                                                    <button key={idx} onClick={() => handleAnswer(idx)} disabled={showResult}
                                                        className={`p-4 rounded-xl border text-left transition-all flex items-center gap-4 ${showResult && questions[currentIndex].answer === idx ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400' : showResult && selectedAnswer === idx ? 'bg-red-500/20 border-red-500/50 text-red-400' : 'bg-white/5 border-white/10 hover:bg-white/10'}`}
                                                    >
                                                        <div className={`w-6 h-6 rounded flex items-center justify-center font-bold text-xs ${showResult && questions[currentIndex].answer === idx ? 'bg-emerald-500 text-white' : 'bg-white/10'}`}>{idx+1}</div>
                                                        <span className="font-medium">{opt}</span>
                                                    </button>
                                                ))
                                            )}
                                        </div>

                                        {showResult && (
                                            <div className="p-6 rounded-2xl bg-white/5 border border-white/10 space-y-4 animate-in fade-in slide-in-from-top-2">
                                                <div className="flex items-center gap-2">
                                                    <Icon name={selectedAnswer === questions[currentIndex].answer ? 'check-circle-2' : 'x-circle'} className={`w-5 h-5 ${selectedAnswer === questions[currentIndex].answer ? 'text-emerald-400' : 'text-red-400'}`} />
                                                    <p className="font-bold">{selectedAnswer === questions[currentIndex].answer ? '完全正確！' : '再試一次！'}</p>
                                                </div>
                                                <p className="text-sm text-slate-400 leading-relaxed">{questions[currentIndex].explanation}</p>
                                                <button onClick={nextQuestion} className="w-full py-3 bg-white text-slate-950 font-black rounded-xl hover:bg-indigo-100 transition-all flex items-center justify-center gap-2">
                                                    下一題 <Icon name="chevron-right" className="w-4 h-4" />
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="glass p-12 rounded-[3rem] text-center space-y-6">
                                        <Icon name="trophy" className="w-16 h-16 text-amber-400 mx-auto animate-bounce" />
                                        <h2 className="text-3xl font-black italic">挑戰成功！</h2>
                                        <button onClick={() => setCurrentIndex(0)} className="px-8 py-3 bg-indigo-500 text-white font-black rounded-xl shadow-lg shadow-indigo-500/30">重新開始</button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="glass p-8 rounded-[2rem] space-y-6">
                                <h2 className="text-lg font-black uppercase tracking-widest text-indigo-400">新增試題</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500">類型</label>
                                        <div className="flex bg-black/40 p-1 rounded-lg">
                                            <button onClick={()=>setNewQuestion({...newQuestion, type:'tf'})} className={`flex-1 py-1.5 text-xs font-bold rounded ${newQuestion.type==='tf'?'bg-indigo-500 text-white':'text-slate-500'}`}>是非</button>
                                            <button onClick={()=>setNewQuestion({...newQuestion, type:'mc'})} className={`flex-1 py-1.5 text-xs font-bold rounded ${newQuestion.type==='mc'?'bg-indigo-500 text-white':'text-slate-500'}`}>選擇</button>
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500">正確答案</label>
                                        <select value={newQuestion.answer} onChange={e=>setNewQuestion({...newQuestion, answer:e.target.value})} className="w-full bg-black/40 border border-white/5 rounded-lg p-1.5 text-xs font-bold focus:outline-none">
                                            {newQuestion.type==='tf' ? (<><option value="O">O</option><option value="X">X</option></>) : (<><option value="0">1</option><option value="1">2</option><option value="2">3</option><option value="3">4</option></>)}
                                        </select>
                                    </div>
                                </div>
                                <textarea value={newQuestion.text} onChange={e=>setNewQuestion({...newQuestion, text:e.target.value})} placeholder="題目敘述..." className="w-full bg-black/40 border border-white/5 rounded-xl p-4 text-sm focus:border-indigo-500 outline-none min-h-[80px]" />
                                <div className="flex gap-2">
                                    <input type="text" value={newQuestion.image} onChange={e=>setNewQuestion({...newQuestion, image:e.target.value})} placeholder="圖片網址..." className="flex-1 bg-black/40 border border-white/5 rounded-lg p-2 text-xs" />
                                    <input type="file" ref={fileInputRef} onChange={handleImageUpload} className="hidden" accept="image/*" />
                                    <button onClick={()=>fileInputRef.current.click()} className="p-2 bg-white/5 rounded-lg"><Icon name="upload" className="w-4 h-4 text-slate-400"/></button>
                                </div>
                                <button onClick={addQuestion} className="w-full py-3 bg-gradient-to-r from-indigo-500 to-fuchsia-500 text-white font-black rounded-xl">發布題目</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
