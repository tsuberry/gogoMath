		];

        /**
         * 數學文字渲染組件
         */
        const MathText = ({ text, className = "" }) => {
            if (!text) return null;
            const parts = text.split(/(\$[^\$]+\$)/g);
            return (
                <span className={className}>
                    {parts.map((part, i) => {
                        if (part.startsWith('$') && part.endsWith('$')) {
                            const latex = part.slice(1, -1);
                            const html = window.katex.renderToString(latex, { throwOnError: false });
                            return <span key={i} dangerouslySetInnerHTML={{ __html: html }} className="mx-0.5" />;
                        }
                        return <span key={i}>{part}</span>;
                    })}
                </span>
            );
        };

        /**
         * Icon 組件
         */
        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.setAttribute('class', className);
                    ref.current.appendChild(i);
                    window.lucide.createIcons({ root: ref.current });
                }
            }, [name, className]);
            return <span ref={ref} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [userAnswers, setUserAnswers] = useState([]);
            const [sessionQuestions, setSessionQuestions] = useState([]); 
            
            const [filterMode, setFilterMode] = useState('unfinished'); 
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [pendingAnswer, setPendingAnswer] = useState(null); // 暫存當前選取的答案
            const [showResult, setShowResult] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [loading, setLoading] = useState(true);
            const [refreshTrigger, setRefreshTrigger] = useState(0);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'math-vibe-default';
            const optionLabels = ['①', '②', '③', '④'];

            // 1. 智能初始化儲存環境 (支援本地 localStorage 與 雲端 Firebase)
            useEffect(() => {
                const initStorage = async () => {
                    // 如果沒有 Firebase 環境變數，切換至本地儲存模式
                    if (typeof __firebase_config === 'undefined') {
                        const localData = localStorage.getItem('math_vibe_progress');
                        if (localData) {
                            setUserAnswers(JSON.parse(localData));
                        }
                        setLoading(false);
                        return;
                    }

                    // 如果有 Firebase 環境，進行雲端連線
                    try {
                        let retries = 20;
                        while (!window.FirebaseSDK && retries > 0) {
                            await new Promise(r => setTimeout(r, 50));
                            retries--;
                        }
                        if (window.FirebaseSDK) {
                            const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore } = window.FirebaseSDK;
                            const firebaseConfig = JSON.parse(__firebase_config);
                            const app = initializeApp(firebaseConfig);
                            const auth = getAuth(app);
                            const firestore = getFirestore(app);
                            setDb(firestore);
                            await signInAnonymously(auth);
                            onAuthStateChanged(auth, (u) => setUser(u));
                        } else {
                            setLoading(false);
                        }
                    } catch (e) {
                        console.error("Firebase init failed, switching to local.", e);
                        setLoading(false);
                    }
                };
                initStorage();
            }, []);

            // 2. 雲端模式進度監聽
            useEffect(() => {
                if (typeof __firebase_config === 'undefined' || !user || !db) return;
                const { collection, onSnapshot } = window.FirebaseSDK;
                const progressCol = collection(db, 'artifacts', appId, 'users', user.uid, 'progress');
                const unsubscribe = onSnapshot(progressCol, (snapshot) => {
                    const answers = snapshot.docs.map(doc => doc.data());
                    setUserAnswers(answers);
                    setLoading(false);
                }, () => setLoading(false));
                return () => unsubscribe();
            }, [user, db]);

            // 3. 穩定的題庫清單控制
            useEffect(() => {
                if (loading) return;
                const answeredIds = new Set(userAnswers.map(a => a.questionId));
                
                if (filterMode === 'unfinished') {
                    setSessionQuestions(initialQuestions.filter(q => !answeredIds.has(q.id)));
                } else {
                    setSessionQuestions(initialQuestions.filter(q => answeredIds.has(q.id)));
                }
                
                setCurrentIndex(0);
                setSelectedAnswer(null);
                setPendingAnswer(null); // 切換模式時重置暫存答案
                setShowResult(false);
                setIsProcessing(false);
            }, [filterMode, loading, refreshTrigger]);

            // 處理選項點擊 (僅選取，不送出)
            const handleOptionClick = (choice) => {
                if (showResult || isProcessing) return;
                setPendingAnswer(choice);
            };

            // 確認並正式送出答案
            const confirmAnswer = async () => {
                // 嚴格防止連擊或未選擇時送出
                if (showResult || isProcessing || pendingAnswer === null) return;
                
                setIsProcessing(true);
                const currentQuestion = sessionQuestions[currentIndex];
                if (!currentQuestion) {
                    setIsProcessing(false);
                    return;
                }

                const isCorrect = pendingAnswer === currentQuestion.answer;
                setSelectedAnswer(pendingAnswer);
                setShowResult(true);

                const newRecord = {
                    questionId: currentQuestion.id,
                    userChoice: pendingAnswer,
                    isCorrect: isCorrect,
                    timestamp: Date.now()
                };

                // 根據環境決定存到哪裡
                if (typeof __firebase_config === 'undefined') {
                    // 寫入瀏覽器 LocalStorage
                    setUserAnswers(prev => {
                        const updated = [...prev, newRecord];
                        localStorage.setItem('math_vibe_progress', JSON.stringify(updated));
                        return updated;
                    });
                    setIsProcessing(false);
                } else {
                    // 寫入雲端 Firebase
                    if (!user || !db) { setIsProcessing(false); return; }
                    try {
                        const { doc, setDoc } = window.FirebaseSDK;
                        const answerDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'progress', currentQuestion.id.toString());
                        await setDoc(answerDoc, newRecord);
                    } catch (e) {
                        console.error("Save failed:", e);
                    } finally {
                        setIsProcessing(false); 
                    }
                }
            };

            const nextQuestion = () => {
                if (currentIndex < sessionQuestions.length) {
                    setSelectedAnswer(null);
                    setPendingAnswer(null); // 換題時重置暫存答案
                    setShowResult(false);
                    setCurrentIndex(prev => prev + 1);
                }
            };

            const clearAllProgress = async () => {
                setLoading(true);
                
                if (typeof __firebase_config === 'undefined') {
                    localStorage.removeItem('math_vibe_progress');
                    setUserAnswers([]);
                    setFilterMode('unfinished');
                    setRefreshTrigger(prev => prev + 1);
                    setLoading(false);
                    return;
                }

                if (!user || !db) return;
                try {
                    const { collection, getDocs, deleteDoc, doc } = window.FirebaseSDK;
                    const progressCol = collection(db, 'artifacts', appId, 'users', user.uid, 'progress');
                    const snapshot = await getDocs(progressCol);
                    const promises = snapshot.docs.map(d => deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'progress', d.id)));
                    await Promise.all(promises);
                } catch(e) {
                    console.error("Clear failed:", e);
                }
                
                setFilterMode('unfinished');
                setRefreshTrigger(prev => prev + 1);
                setLoading(false);
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-[#020408]">
                    <div className="text-center space-y-4">
                        <div className="w-8 h-8 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin mx-auto"></div>
                        <p className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Initializing Lab...</p>
                    </div>
                </div>
            );

            // 當前題目物件
            const activeQ = sessionQuestions[currentIndex];

            return (
                <div className="min-h-screen selection-none pb-20">
                    <div className="fixed inset-0 overflow-hidden -z-10 bg-[#020408]">
                        <div className="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-indigo-600/5 blur-[150px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-fuchsia-600/5 blur-[150px] rounded-full"></div>
                    </div>

                    <nav className="max-w-4xl mx-auto flex items-center justify-between px-6 py-6 border-b border-white/5 bg-black/20 backdrop-blur-md sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-fuchsia-500 rounded-xl flex items-center justify-center shadow-lg">
                                <Icon name="book-open" className="text-white w-6 h-6" />
                            </div>
                            <h1 className="text-xl font-black tracking-tighter uppercase">Math <span className="text-indigo-400">Vibe</span></h1>
                        </div>
                        <div className="flex bg-white/5 p-1 rounded-xl border border-white/10">
                            <button 
                                onClick={() => setFilterMode('unfinished')} 
                                className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${filterMode === 'unfinished' ? 'bg-indigo-500 text-white' : 'text-slate-500 hover:text-white'}`}
                            >
                                未完成
                            </button>
                            <button 
                                onClick={() => setFilterMode('finished')} 
                                className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${filterMode === 'finished' ? 'bg-indigo-500 text-white' : 'text-slate-500 hover:text-white'}`}
                            >
                                已完成
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-4 mt-8">
                        {filterMode === 'unfinished' && activeQ ? (
                            <div key={activeQ.id} className="space-y-8 animate-in fade-in slide-in-from-bottom-4">
                                <div className="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                                    <div className="h-full bg-gradient-to-r from-indigo-500 to-fuchsia-500 transition-all duration-700" style={{ width: `${((currentIndex) / sessionQuestions.length) * 100}%` }}></div>
                                </div>

                                <div className="glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl space-y-10">
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-center">
                                            <div className="inline-block px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] font-black text-indigo-400 uppercase tracking-widest">
                                                {activeQ.type === 'tf' ? '是非題' : '選擇題'}
                                            </div>
                                            <span className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">
                                                Progress: {currentIndex + 1} / {sessionQuestions.length}
                                            </span>
                                        </div>
                                        <h2 className="text-2xl md:text-3xl font-bold leading-snug tracking-tight">
                                            <MathText text={activeQ.text} />
                                        </h2>
                                        {activeQ.image && (
                                            <div className="rounded-2xl overflow-hidden border border-white/10 bg-black/40 max-w-lg mx-auto">
                                                <img src={activeQ.image} className="w-full h-auto object-contain" alt="題目圖片" />
                                            </div>
                                        )}
                                    </div>

                                    <div className={`grid ${activeQ.type === 'tf' ? 'grid-cols-2' : 'grid-cols-1 md:grid-cols-2'} gap-4`}>
                                        {activeQ.type === 'tf' ? (
                                            ['O', 'X'].map(choice => (
                                                <button 
                                                    key={choice} 
                                                    onClick={() => handleOptionClick(choice)} 
                                                    disabled={showResult || isProcessing}
                                                    className={`p-8 rounded-3xl border transition-all duration-300 flex flex-col items-center gap-3 ${showResult && activeQ.answer === choice ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400 shadow-lg' : showResult && selectedAnswer === choice ? 'bg-red-500/20 border-red-500/50 text-red-400' : (!showResult && pendingAnswer === choice ? 'bg-indigo-500/20 border-indigo-500/50 text-indigo-400 shadow-lg shadow-indigo-500/10 scale-[1.02]' : (showResult || isProcessing ? 'opacity-50 cursor-not-allowed' : 'bg-white/5 border-white/10 text-slate-400 hover:text-white hover:bg-white/10 active:scale-95'))}`}
                                                >
                                                    <Icon name={choice === 'O' ? 'check-circle-2' : 'x-circle'} className="w-10 h-10" />
                                                    <span className="font-black text-lg">{choice === 'O' ? 'TRUE (O)' : 'FALSE (X)'}</span>
                                                </button>
                                            ))
                                        ) : (
                                            activeQ.options.map((opt, idx) => (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => handleOptionClick(idx)} 
                                                    disabled={showResult || isProcessing}
                                                    className={`p-5 rounded-2xl border text-left transition-all duration-300 flex items-center gap-4 ${showResult && activeQ.answer === idx ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400 shadow-lg' : showResult && selectedAnswer === idx ? 'bg-red-500/20 border-red-500/50 text-red-400' : (!showResult && pendingAnswer === idx ? 'bg-indigo-500/20 border-indigo-500/50 text-indigo-400 shadow-lg shadow-indigo-500/10 scale-[1.02]' : (showResult || isProcessing ? 'opacity-50 cursor-not-allowed' : 'bg-white/5 border-white/10 text-slate-400 hover:text-white hover:bg-white/10 active:scale-95'))}`}
                                                >
                                                    <div className={`w-10 h-10 shrink-0 rounded-lg flex items-center justify-center font-black ${showResult && activeQ.answer === idx ? 'bg-emerald-500 text-white shadow-md' : (!showResult && pendingAnswer === idx ? 'bg-indigo-500 text-white shadow-md' : 'bg-white/10')}`}>
                                                        {optionLabels[idx]}
                                                    </div>
                                                    <MathText text={opt} className="font-bold text-lg" />
                                                </button>
                                            ))
                                        )}
                                    </div>

                                    {!showResult && (
                                        <div className="pt-4 flex flex-col sm:flex-row items-center justify-center gap-4 animate-in fade-in duration-500">
                                            <button 
                                                onClick={nextQuestion} 
                                                disabled={isProcessing}
                                                className="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-4 rounded-2xl bg-white/5 border border-white/10 text-slate-400 hover:text-white hover:bg-white/10 transition-all text-xs font-black uppercase tracking-widest active:scale-95"
                                            >
                                                <Icon name="clock" className="w-4 h-4" />
                                                需要再想想 (先跳過)
                                            </button>
                                            <button 
                                                onClick={confirmAnswer} 
                                                disabled={pendingAnswer === null || isProcessing}
                                                className={`w-full sm:w-auto flex items-center justify-center gap-2 px-10 py-4 rounded-2xl transition-all text-sm font-black uppercase tracking-widest active:scale-95 ${pendingAnswer !== null && !isProcessing ? 'bg-gradient-to-r from-indigo-500 to-fuchsia-500 text-white shadow-xl shadow-indigo-500/30 hover:scale-[1.02]' : 'bg-white/5 border border-white/10 text-slate-600 cursor-not-allowed'}`}
                                            >
                                                <Icon name="check" className="w-5 h-5" />
                                                確認送出
                                            </button>
                                        </div>
                                    )}

                                    {showResult && (
                                        <div className="p-6 rounded-3xl bg-indigo-500/10 border border-indigo-500/20 animate-in zoom-in-95 backdrop-blur-sm shadow-xl">
                                            <div className="flex items-center gap-4 mb-4">
                                                <Icon name={selectedAnswer === activeQ.answer ? 'check-circle-2' : 'x-circle'} className={`w-8 h-8 ${selectedAnswer === activeQ.answer ? 'text-emerald-400' : 'text-red-400'}`} />
                                                <p className="font-black text-xl italic uppercase tracking-tighter">
                                                    {selectedAnswer === activeQ.answer ? 'Excellent' : 'Review Logic'}
                                                </p>
                                            </div>
                                            <button onClick={nextQuestion} className="w-full py-4 bg-white text-slate-950 font-black rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest text-sm italic">
                                                {currentIndex === sessionQuestions.length - 1 ? '查看結果清單' : '進入下一題'}
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-10 animate-in fade-in duration-700 pb-20">
                                <div className="glass p-10 rounded-[3rem] text-center space-y-6 shadow-2xl border-indigo-500/10">
                                    <Icon name="award" className="w-16 h-16 text-amber-400 mx-auto animate-bounce mb-2" />
                                    <h2 className="text-3xl font-black italic tracking-tighter uppercase leading-none">
                                        {filterMode === 'unfinished' 
                                            ? (userAnswers.length === initialQuestions.length ? '全部任務清空！' : '本回合結束！') 
                                            : '作答數據回顧'}
                                    </h2>
                                    <p className="text-slate-500 text-sm font-bold uppercase tracking-[0.2em]">完成度: {userAnswers.length} / {initialQuestions.length}</p>
                                    <div className="flex justify-center gap-4 pt-2">
                                        <button onClick={() => {setFilterMode('unfinished'); setRefreshTrigger(prev=>prev+1);}} className="px-8 py-3 bg-white text-slate-900 font-black rounded-2xl shadow-xl active:scale-95 transition-all text-sm uppercase italic tracking-widest">
                                            繼續挑戰
                                        </button>
                                        <button onClick={clearAllProgress} className="px-6 py-3 bg-red-500/10 border border-red-500/20 text-red-400 font-bold rounded-2xl active:scale-95 transition-all text-[10px] uppercase">
                                            清空進度
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] px-2 flex items-center gap-2">
                                        <Icon name="history" className="w-3 h-3" /> Result History
                                    </h3>
                                    
                                    <div className="grid gap-3">
                                        {sessionQuestions.length === 0 && <div className="text-center py-20 opacity-20 text-[10px] uppercase font-black tracking-widest">暫無數據</div>}
                                        {sessionQuestions.map((q, idx) => {
                                            const record = userAnswers.find(a => a.questionId === q.id);
                                            return (
                                                <div key={q.id} className={`glass p-5 md:p-6 rounded-[2rem] border-l-[6px] transition-all hover:bg-white/[0.04] ${record?.isCorrect ? 'border-l-emerald-500 shadow-md shadow-emerald-500/5' : 'border-l-red-500 shadow-md shadow-red-500/5'}`}>
                                                    <div className="flex flex-col md:flex-row md:items-start justify-between gap-6">
                                                        <div className="flex-1 min-w-0">
                                                            <div className="flex items-center gap-2 mb-3">
                                                                <span className="text-[9px] font-black text-slate-600 bg-white/5 px-2 py-0.5 rounded tracking-tighter uppercase">No.{idx+1}</span>
                                                                <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-full ${record?.isCorrect ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}`}>
                                                                    {record?.isCorrect ? 'Correct' : 'Incorrect'}
                                                                </span>
                                                            </div>
                                                            <h4 className="text-base md:text-lg font-bold text-slate-100 leading-snug mb-4">
                                                                <MathText text={q.text} />
                                                            </h4>
                                                            {q.image && (
                                                                <div className="rounded-2xl overflow-hidden border border-white/5 bg-black/40 mb-4 max-w-[150px]">
                                                                    <img src={q.image} className="w-full h-auto" alt="回顧圖片" />
                                                                </div>
                                                            )}
                                                            {q.type === 'mc' && (
                                                                <div className="flex flex-wrap gap-2 mb-2">
                                                                    {q.options.map((opt, i) => (
                                                                        <div key={i} className={`px-2 py-1 rounded-lg text-[10px] font-medium border flex items-center gap-1.5 ${q.answer === i ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : (record?.userChoice === i ? 'bg-red-500/10 border-red-500/20 text-red-400' : 'bg-white/5 border-white/5 text-slate-500')}`}>
                                                                            <span className="opacity-60 text-[8px] font-black">{optionLabels[i]}</span> <MathText text={opt} />
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>

                                                        <div className="flex md:flex-col gap-2 shrink-0 md:w-32">
                                                            <div className="flex-1 p-2 rounded-xl bg-white/5 border border-white/5 text-center">
                                                                <p className="text-[8px] font-bold text-slate-600 uppercase mb-0.5 tracking-tighter">Your Pick</p>
                                                                <p className={`text-xs font-black ${record?.isCorrect ? 'text-emerald-400' : 'text-red-400'}`}>
                                                                    {q.type === 'tf' ? record?.userChoice : optionLabels[record?.userChoice]}
                                                                </p>
                                                            </div>
                                                            <div className="flex-1 p-2 rounded-xl bg-indigo-500/10 border border-indigo-500/20 text-center">
                                                                <p className="text-[8px] font-bold text-indigo-500 uppercase mb-0.5 tracking-tighter">Answer</p>
                                                                <p className="text-xs font-black text-indigo-400 italic">
                                                                    {q.type === 'tf' ? q.answer : optionLabels[q.answer]}
                                                                </p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-4 left-0 right-0 flex justify-center pointer-events-none z-50">
                        <div className="glass px-5 py-2 rounded-full border border-white/10 shadow-2xl flex items-center gap-3 backdrop-blur-xl">
                            <span className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-pulse"></span>
                            <p className="text-[8px] text-slate-500 font-bold uppercase tracking-[0.5em] italic">Math Vibe Lab • Hybrid Sync</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
