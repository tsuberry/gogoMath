<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Vibe Lab - 互動數學試題</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 與 Babel (用於即時編譯 JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Lucide 圖標 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020408; color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-border { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
        .selection-none { user-select: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // 圖標組件封裝
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            // 完整題庫：包含是非題 (1-3) 與選擇題 (4-9)
            const initialQuestions = [
                { id: 1, type: 'tf', text: '一個長方體的長和寬不變，高變成原來的 4 倍，體積也會變成原來的 4 倍。', answer: 'O', explanation: '長方體體積 = 長 × 寬 × 高。當長和寬不變，高變 4 倍，體積確實會隨之變為 4 倍。' },
                { id: 2, type: 'tf', text: '用小正方體積木堆成一個大的正方體，至少需要 4 個小正方體積木。', answer: 'X', explanation: '堆成一個「大的正方體」，邊長至少要 2 個單位，所以需要 2×2×2 = 8 個小正方體。' },
                { id: 3, type: 'tf', text: '86 的 1/100 倍是 0.86，就是將小數點向左移二位。', answer: 'O', explanation: '乘以 1/100 等於除以 100。每除以一個 10，小數點就向左移動一位，所以移動兩位是正確的。' },
                { 
                    id: 4, type: 'mc', text: '「一盒蛋糕有 12 塊，全家人吃掉 5/18 盒，是吃掉多少塊？」下面哪一個算式是正確的？', 
                    options: ['12 × 5/18', '12 - 5/18', '12 + 5/18', '12 ÷ 5/18'], answer: 0, 
                    explanation: '求「數量的幾分之幾」使用乘法：總數(12) × 比例(5/18)。' 
                },
                { 
                    id: 5, type: 'mc', text: '74,000,000 毫升相當於多少立方公尺？', 
                    options: ['7400 立方公尺', '740 立方公尺', '74 立方公尺', '7.4 立方公尺'], answer: 2, 
                    explanation: '1,000,000 毫升 = 1 立方公尺。74,000,000 ÷ 1,000,000 = 74。' 
                },
                { 
                    id: 6, type: 'mc', text: '「0.01 × 0.0001」的計算結果，和下面哪一個算式的結果一樣？', 
                    options: ['0.001 × 0.001', '0.001 × 0.1', '0.001 × 0.0001', '0.1 × 0.0001'], answer: 0, 
                    explanation: '0.01 (兩位) × 0.0001 (四位) = 六位小數。0.001 (三位) × 0.001 (三位) 也是六位。' 
                },
                { 
                    id: 7, type: 'mc', text: '瑋玲拿一條長 26 公尺的繩子，剛好圍成一個長是 7.5 公尺的長方形，面積是多少？', 
                    options: ['41.25', '21.5', '43.35', '37'], answer: 0, 
                    explanation: '周長 26 → 長+寬=13。寬 = 13 - 7.5 = 5.5。面積 = 7.5 × 5.5 = 41.25。' 
                },
                { 
                    id: 8, type: 'mc', text: '下圖兩個造型都是用 1 立方公分的積木所排出來的，乙體積比甲大多少？', 
                    image: 'https://tsuberry.github.io/gogoMath/question001.jpg', // 示意圖
                    options: ['10 立方公分', '20 立方公分', '30 立方公分', '40 立方公分'], answer: 0, 
                    explanation: '' 
                },
                { 
                    id: 9, type: 'mc', text: '下列哪一個選項的乘積最大？', 
                    options: ['7 × 3/3', '7 × 4/9', '7 × 11/4', '7 × 12/4'], answer: 3, 
                    explanation: '12/4 = 3 是最大的乘數，故乘積最大。' 
                }
            ];

            const [questions, setQuestions] = useState(initialQuestions);
            const [currentView, setCurrentView] = useState('quiz'); 
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [dailyStats, setDailyStats] = useState({ completed: 0, correct: 0 });
            const [newQuestion, setNewQuestion] = useState({ 
                text: '', type: 'tf', answer: 'O', explanation: '', options: ['', '', '', ''], image: ''
            });

            const fileInputRef = useRef(null);
            const progress = useMemo(() => questions.length > 0 ? (currentIndex / questions.length) * 100 : 0, [currentIndex, questions.length]);

            const handleAnswer = (choice) => {
                if (showResult) return;
                setSelectedAnswer(choice);
                setShowResult(true);
                const isCorrect = choice === questions[currentIndex].answer;
                setDailyStats(prev => ({ completed: prev.completed + 1, correct: isCorrect ? prev.correct + 1 : prev.correct }));
            };

            const nextQuestion = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                    setSelectedAnswer(null);
                    setShowResult(false);
                } else {
                    setCurrentIndex(questions.length); 
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setNewQuestion({ ...newQuestion, image: reader.result });
                    reader.readAsDataURL(file);
                }
            };

            const addQuestion = () => {
                if (!newQuestion.text) return;
                const q = { ...newQuestion, id: Date.now(), answer: newQuestion.type === 'tf' ? newQuestion.answer : parseInt(newQuestion.answer) };
                setQuestions([...questions, q]);
                setNewQuestion({ text: '', type: 'tf', answer: 'O', explanation: '', options: ['', '', '', ''], image: '' });
            };

            const optionLabels = ['①', '②', '③', '④'];

            return (
                <div className="min-h-screen selection-none">
                    {/* 背景霓虹 */}
                    <div className="fixed inset-0 overflow-hidden -z-10 bg-[#020408]">
                        <div className="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-indigo-600/10 blur-[150px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-fuchsia-600/10 blur-[150px] rounded-full"></div>
                    </div>

                    <nav className="max-w-5xl mx-auto flex items-center justify-between px-6 py-8">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-gradient-to-br from-indigo-500 to-fuchsia-500 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-500/40">
                                <Icon name="book-open" className="text-white w-7 h-7" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter">MATH <span className="text-indigo-400">VIBE</span></h1>
                                <p className="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Comprehensive Exam Suite</p>
                            </div>
                        </div>
                        <div className="flex bg-white/5 p-1.5 rounded-2xl border border-white/10">
                            <button onClick={() => setCurrentView('quiz')} className={`px-6 py-2 rounded-xl text-sm font-bold transition-all ${currentView === 'quiz' ? 'bg-indigo-500 text-white shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:text-white'}`}>作答挑戰</button>
                            <button onClick={() => setCurrentView('admin')} className={`px-6 py-2 rounded-xl text-sm font-bold transition-all ${currentView === 'admin' ? 'bg-indigo-500 text-white shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:text-white'}`}>試題管理</button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-6 pb-20">
                        {currentView === 'quiz' ? (
                            <div className="space-y-8 animate-in fade-in duration-700">
                                <div className="grid grid-cols-3 gap-4">
                                    <div className="glass p-6 rounded-3xl text-center group hover:border-indigo-500/30 transition-all">
                                        <Icon name="bar-chart-3" className="w-6 h-6 mx-auto mb-2 text-blue-400 opacity-60" />
                                        <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest">已完成</p>
                                        <p className="text-2xl font-black">{dailyStats.completed} 題</p>
                                    </div>
                                    <div className="glass p-6 rounded-3xl text-center group hover:border-emerald-500/30 transition-all">
                                        <Icon name="check-circle-2" className="w-6 h-6 mx-auto mb-2 text-emerald-400 opacity-60" />
                                        <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest">答對數</p>
                                        <p className="text-2xl font-black text-emerald-400">{dailyStats.correct}</p>
                                    </div>
                                    <div className="glass p-6 rounded-3xl text-center group hover:border-amber-500/30 transition-all">
                                        <Icon name="trophy" className="w-6 h-6 mx-auto mb-2 text-amber-400 opacity-60" />
                                        <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest">準確率</p>
                                        <p className="text-2xl font-black">{dailyStats.completed > 0 ? Math.round((dailyStats.correct/dailyStats.completed)*100) : 0}%</p>
                                    </div>
                                </div>

                                <div className="w-full h-2.5 bg-white/5 rounded-full overflow-hidden border border-white/5 p-0.5">
                                    <div className="h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-fuchsia-500 rounded-full transition-all duration-1000 ease-out shadow-[0_0_15px_rgba(99,102,241,0.4)]" style={{ width: `${progress}%` }}></div>
                                </div>

                                {currentIndex < questions.length ? (
                                    <div className="glass p-10 md:p-12 rounded-[3rem] shadow-2xl space-y-10 relative overflow-hidden">
                                        <div className="space-y-6">
                                            <span className="px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em]">
                                                {questions[currentIndex].type === 'tf' ? '是非題' : '選擇題'}
                                            </span>
                                            <h2 className="text-2xl md:text-3xl font-bold leading-relaxed text-slate-100">{questions[currentIndex].text}</h2>
                                            
                                            {questions[currentIndex].image && (
                                                <div className="rounded-[2rem] overflow-hidden border border-white/10 bg-black/40">
                                                    <img src={questions[currentIndex].image} className="w-full h-auto max-h-[400px] object-contain transition-transform duration-700 hover:scale-105" />
                                                </div>
                                            )}
                                        </div>

                                        <div className={`grid ${questions[currentIndex].type === 'tf' ? 'grid-cols-2' : 'grid-cols-1 md:grid-cols-2'} gap-6`}>
                                            {questions[currentIndex].type === 'tf' ? (
                                                ['O', 'X'].map(choice => (
                                                    <button key={choice} onClick={() => handleAnswer(choice)} disabled={showResult}
                                                        className={`p-10 rounded-[2.5rem] border transition-all duration-500 flex flex-col items-center gap-4 ${showResult && questions[currentIndex].answer === choice ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400' : showResult && selectedAnswer === choice ? 'bg-red-500/20 border-red-500/50 text-red-400' : 'bg-white/5 border-white/10 hover:bg-white/10 hover:border-indigo-500/40 text-slate-400 hover:text-white'}`}
                                                    >
                                                        <Icon name={choice === 'O' ? 'check-circle-2' : 'x-circle'} className="w-12 h-12" />
                                                        <span className="font-black text-xl italic tracking-widest">{choice === 'O' ? 'TRUE (O)' : 'FALSE (X)'}</span>
                                                    </button>
                                                ))
                                            ) : (
                                                questions[currentIndex].options.map((opt, idx) => (
                                                    <button key={idx} onClick={() => handleAnswer(idx)} disabled={showResult}
                                                        className={`p-6 rounded-3xl border text-left transition-all duration-300 flex items-center gap-5 ${showResult && questions[currentIndex].answer === idx ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400 scale-[1.02]' : showResult && selectedAnswer === idx ? 'bg-red-500/20 border-red-500/50 text-red-400' : 'bg-white/5 border-white/10 hover:bg-white/10 hover:border-indigo-500/40 text-slate-400 hover:text-white'}`}
                                                    >
                                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-lg ${showResult && questions[currentIndex].answer === idx ? 'bg-emerald-500 text-white' : 'bg-white/10'}`}>
                                                            {optionLabels[idx]}
                                                        </div>
                                                        <span className="font-bold text-xl">{opt}</span>
                                                    </button>
                                                ))
                                            )}
                                        </div>

                                        {showResult && (
                                            <div className="p-8 rounded-[2.5rem] bg-indigo-500/5 border border-indigo-500/20 space-y-6 animate-in zoom-in-95 duration-500">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center shadow-lg ${selectedAnswer === questions[currentIndex].answer ? 'bg-emerald-500' : 'bg-red-500'}`}>
                                                        <Icon name={selectedAnswer === questions[currentIndex].answer ? 'check-circle-2' : 'x-circle'} className="w-6 h-6 text-white" />
                                                    </div>
                                                    <div>
                                                        <p className={`font-black text-xl ${selectedAnswer === questions[currentIndex].answer ? 'text-emerald-400' : 'text-red-400'}`}>
                                                            {selectedAnswer === questions[currentIndex].answer ? '卓越，完全正確！' : '別放棄，再來一次！'}
                                                        </p>
                                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">
                                                            正確解答：{questions[currentIndex].type === 'tf' ? questions[currentIndex].answer : optionLabels[questions[currentIndex].answer] + " " + questions[currentIndex].options[questions[currentIndex].answer]}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className="p-6 bg-white/5 rounded-2xl border border-white/5 text-slate-300 text-lg leading-relaxed font-medium">
                                                    {questions[currentIndex].explanation}
                                                </div>
                                                <button onClick={nextQuestion} className="w-full py-5 bg-white text-slate-950 font-black rounded-[1.5rem] hover:bg-indigo-100 transition-all flex items-center justify-center gap-3 shadow-xl shadow-white/5 active:scale-95">
                                                    下一題挑戰 <Icon name="chevron-right" className="w-6 h-6" />
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="glass p-20 rounded-[4rem] text-center space-y-8 animate-in zoom-in duration-1000">
                                        <div className="relative inline-block">
                                            <div className="absolute inset-0 bg-amber-400/20 blur-3xl rounded-full"></div>
                                            <Icon name="trophy" className="w-24 h-24 text-amber-400 mx-auto animate-bounce relative z-10" />
                                        </div>
                                        <div className="space-y-2">
                                            <h2 className="text-4xl font-black italic tracking-tighter">MISSION ACCOMPLISHED</h2>
                                            <p className="text-slate-500 font-bold uppercase tracking-[0.3em] text-xs">你已完成所有預設試題挑戰</p>
                                        </div>
                                        <button onClick={() => setCurrentIndex(0)} className="px-12 py-4 bg-indigo-500 text-white font-black rounded-2xl shadow-2xl shadow-indigo-500/40 hover:scale-105 transition-all active:scale-95">重新開始測驗</button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="glass p-10 rounded-[3rem] space-y-8 shadow-2xl">
                                    <div className="flex items-center gap-3 text-indigo-400">
                                        <Icon name="plus" className="w-6 h-6" />
                                        <h2 className="text-xl font-black uppercase tracking-widest italic">入庫新試題</h2>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">題型類別</label>
                                            <div className="flex bg-black p-1 rounded-xl border border-white/5">
                                                <button onClick={()=>setNewQuestion({...newQuestion, type:'tf', answer: 'O'})} className={`flex-1 py-3 text-xs font-black rounded-lg transition-all ${newQuestion.type==='tf'?'bg-indigo-500 text-white':'text-slate-500'}`}>是非題</button>
                                                <button onClick={()=>setNewQuestion({...newQuestion, type:'mc', answer: '0'})} className={`flex-1 py-3 text-xs font-black rounded-lg transition-all ${newQuestion.type==='mc'?'bg-indigo-500 text-white':'text-slate-500'}`}>選擇題</button>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">正確答案索引</label>
                                            <select value={newQuestion.answer} onChange={e=>setNewQuestion({...newQuestion, answer:e.target.value})} className="w-full bg-black border border-white/5 rounded-xl p-3 text-sm font-bold focus:outline-none focus:border-indigo-500/50 transition-colors">
                                                {newQuestion.type==='tf' ? (<><option value="O">正確 (O)</option><option value="X">錯誤 (X)</option></>) : (<><option value="0">①</option><option value="1">②</option><option value="2">③</option><option value="3">④</option></>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">題目文字敘述</label>
                                        <textarea value={newQuestion.text} onChange={e=>setNewQuestion({...newQuestion, text:e.target.value})} placeholder="例如：74000 毫升等於多少公升？" className="w-full bg-black border border-white/5 rounded-2xl p-5 text-sm focus:border-indigo-500 outline-none min-h-[100px] transition-all" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">附圖資源 (URL 或 上傳)</label>
                                        <div className="flex gap-3">
                                            <input type="text" value={newQuestion.image} onChange={e=>setNewQuestion({...newQuestion, image:e.target.value})} placeholder="https://..." className="flex-1 bg-black border border-white/5 rounded-xl p-3 text-xs" />
                                            <input type="file" ref={fileInputRef} onChange={handleImageUpload} className="hidden" accept="image/*" />
                                            <button onClick={()=>fileInputRef.current.click()} className="p-3 bg-white/5 rounded-xl border border-white/10 hover:bg-white/10"><Icon name="upload" className="w-5 h-5 text-slate-400"/></button>
                                        </div>
                                        {newQuestion.image && <div className="mt-2 h-24 w-full rounded-xl overflow-hidden border border-white/10"><img src={newQuestion.image} className="w-full h-full object-cover opacity-50" /></div>}
                                    </div>
                                    <button onClick={addQuestion} className="w-full py-5 bg-gradient-to-r from-indigo-500 to-fuchsia-500 text-white font-black rounded-2xl shadow-xl shadow-indigo-500/20 active:scale-[0.98] transition-all">發布新試題至資料庫</button>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-slate-500 uppercase tracking-[0.2em] px-2">現有試卷題目庫 ({questions.length})</h3>
                                    <div className="grid gap-3">
                                        {questions.map((q, idx) => (
                                            <div key={q.id} className="glass p-6 rounded-3xl flex items-center justify-between group transition-all hover:bg-white/5">
                                                <div className="flex items-center gap-5">
                                                    <div className="w-10 h-10 rounded-xl bg-black border border-white/10 flex items-center justify-center text-xs font-black text-slate-500 group-hover:text-indigo-400 transition-colors">{idx + 1}</div>
                                                    <div>
                                                        <p className="font-bold text-slate-200 line-clamp-1">{q.text}</p>
                                                        <p className="text-[9px] font-black text-emerald-500 uppercase tracking-widest mt-1">
                                                            ANSWER: {q.type==='tf' ? q.answer : optionLabels[q.answer]}
                                                        </p>
                                                    </div>
                                                </div>
                                                <button onClick={() => setQuestions(questions.filter(item => item.id !== q.id))} className="p-3 text-slate-600 hover:text-red-400 hover:bg-red-400/10 rounded-xl transition-all"><Icon name="trash-2" className="w-5 h-5" /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-6 left-0 right-0 flex justify-center pointer-events-none">
                        <div className="glass px-6 py-2 rounded-full border border-white/10 shadow-2xl">
                            <p className="text-[10px] text-slate-500 font-black uppercase tracking-[0.4em] flex items-center gap-3">
                                <span className="w-1 h-1 bg-indigo-500 rounded-full animate-ping"></span>
                                Math Vibe Lab • Adaptive Learning Engine
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
